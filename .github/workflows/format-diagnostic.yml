name: Format diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  format-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: python -m pip install "ruff>=0.11,<1"
      - name: Generate formatter patch
        shell: bash
        run: |
          ruff format backend
          git diff -- backend > ruff-format.patch
          test -s ruff-format.patch
      - name: Upload formatter patch
        uses: actions/upload-artifact@v4
        with:
          name: ruff-format-patch
          path: ruff-format.patch
          if-no-files-found: error
