name: Test diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-test-log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Run tests and capture log
        shell: bash
        run: |
          set +e
          pytest backend/tests -q > pytest.log 2>&1
          status=$?
          cat pytest.log
          echo "$status" > pytest.exit-code
          exit 0
      - name: Upload test log
        uses: actions/upload-artifact@v4
        with:
          name: pytest-diagnostic
          path: |
            pytest.log
            pytest.exit-code
          if-no-files-found: error
