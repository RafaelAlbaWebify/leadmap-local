name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Type check
        run: mypy
      - name: Tests
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Normalize lockfile registry metadata
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const path = 'package-lock.json';
          const lock = JSON.parse(fs.readFileSync(path, 'utf8'));
          for (const entry of Object.values(lock.packages ?? {})) {
            if (entry && typeof entry === 'object' && typeof entry.resolved === 'string') {
              if (!entry.resolved.startsWith('https://registry.npmjs.org/')) {
                delete entry.resolved;
              }
            }
          }
          fs.writeFileSync(path, `${JSON.stringify(lock, null, 2)}\n`);
          NODE
      - name: Install
        run: npm ci --no-audit --no-fund --registry=https://registry.npmjs.org
      - name: Lint
        run: npm run lint
      - name: Test
        run: |
          set -o pipefail
          npm run test 2>&1 | tee test-output.txt
      - name: Upload test diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-output
          path: frontend/test-output.txt
          if-no-files-found: error
      - name: Build
        run: npm run build
