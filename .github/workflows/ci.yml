name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Format changed files
        run: |
          ruff --version
          ruff format \
            backend/leadmap/api/geography_routes.py \
            backend/leadmap/api/schemas.py \
            backend/leadmap/geography/__init__.py \
            backend/leadmap/geography/territory_links.py \
            backend/tests/test_geography_territory_links.py
      - name: Upload formatted backend files
        uses: actions/upload-artifact@v4
        with:
          name: territory-link-formatted-files
          path: |
            backend/leadmap/api/geography_routes.py
            backend/leadmap/api/schemas.py
            backend/leadmap/geography/__init__.py
            backend/leadmap/geography/territory_links.py
            backend/tests/test_geography_territory_links.py
          if-no-files-found: error
      - name: Format check
        run: git diff --exit-code -- backend/leadmap backend/tests
      - name: Type check
        run: mypy
      - name: Tests
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Normalize lockfile registry metadata
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const path = 'package-lock.json';
          const lock = JSON.parse(fs.readFileSync(path, 'utf8'));
          for (const entry of Object.values(lock.packages ?? {})) {
            if (entry && typeof entry === 'object' && typeof entry.resolved === 'string') {
              if (!entry.resolved.startsWith('https://registry.npmjs.org/')) {
                delete entry.resolved;
              }
            }
          }
          fs.writeFileSync(path, `${JSON.stringify(lock, null, 2)}\n`);
          NODE
      - name: Install
        run: npm ci --no-audit --no-fund --registry=https://registry.npmjs.org
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build
      - name: Install Playwright
        run: |
          npm install --no-save --package-lock=false --ignore-scripts playwright@1.55.0
          npx playwright install --with-deps chromium
      - name: Playwright screenshot review
        run: node e2e/geography-screenshot-review.mjs
      - name: Upload screenshot review
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: geography-screenshot-review
          path: frontend/artifacts/screenshots
          if-no-files-found: error

  frontend-windows:
    runs-on: windows-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Normalize lockfile registry metadata
        shell: pwsh
        run: |
          @'
          const fs = require('node:fs');
          const path = 'package-lock.json';
          const lock = JSON.parse(fs.readFileSync(path, 'utf8'));
          for (const entry of Object.values(lock.packages ?? {})) {
            if (entry && typeof entry === 'object' && typeof entry.resolved === 'string') {
              if (!entry.resolved.startsWith('https://registry.npmjs.org/')) {
                delete entry.resolved;
              }
            }
          }
          fs.writeFileSync(path, `${JSON.stringify(lock, null, 2)}\n`);
          '@ | node
      - name: Install
        run: npm ci --no-audit --no-fund --registry=https://registry.npmjs.org
      - name: Build
        run: npm run build
      - name: Install Playwright
        run: |
          npm install --no-save --package-lock=false --ignore-scripts playwright@1.55.0
          npx playwright install chromium
      - name: Windows Playwright acceptance
        run: node e2e/geography-screenshot-review.mjs
      - name: Upload Windows screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: geography-screenshot-review-windows
          path: frontend/artifacts/screenshots
          if-no-files-found: error
