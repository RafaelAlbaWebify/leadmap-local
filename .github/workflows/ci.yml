name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Produce formatter diagnostic
        run: ruff format backend/leadmap backend/tests
      - name: Upload formatter diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: formatted-geography-api
          path: |
            backend/leadmap/api/geography_routes.py
            backend/leadmap/api/schemas.py
            backend/leadmap/config.py
            backend/leadmap/geography/__init__.py
            backend/leadmap/geography/storage.py
            backend/leadmap/main.py
            backend/tests/test_geography_api.py
          if-no-files-found: error
      - name: Verify source was already formatted
        run: git diff --exit-code
      - name: Format check
        run: ruff format --check .
      - name: Type check
        run: mypy
      - name: Tests
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Normalize lockfile registry metadata
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const path = 'package-lock.json';
          const lock = JSON.parse(fs.readFileSync(path, 'utf8'));
          for (const entry of Object.values(lock.packages ?? {})) {
            if (entry && typeof entry === 'object' && typeof entry.resolved === 'string') {
              if (!entry.resolved.startsWith('https://registry.npmjs.org/')) {
                delete entry.resolved;
              }
            }
          }
          fs.writeFileSync(path, `${JSON.stringify(lock, null, 2)}\n`);
          NODE
      - name: Install
        run: npm ci --no-audit --no-fund --registry=https://registry.npmjs.org
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build
